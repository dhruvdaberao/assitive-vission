<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Network Traffic Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom mb-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-shield-lock-fill fs-4 me-2 text-primary"></i>
                <span class="fw-bold tracking-wide">Intelligent Network Analyzer</span>
            </a>
            <div class="d-flex text-white-50 align-items-center">
                <div class="spinner-grow spinner-grow-sm text-success me-2" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                Live Monitoring Active
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <!-- Key Metrics Cards -->
        <div class="row mb-4">
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card metric-card border-left-primary shadow-sm h-100 py-2">
                    <div class="card-body">
                        <div class="row no-gutters align-items-center">
                            <div class="col mr-2">
                                <div class="text-xs fw-bold text-primary text-uppercase mb-1">Total Packets Analyzed</div>
                                <div class="h3 mb-0 fw-bold text-gray-800" id="totalPackets">0</div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-activity fa-2x text-gray-300 fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card metric-card border-left-danger shadow-sm h-100 py-2">
                    <div class="card-body">
                        <div class="row no-gutters align-items-center">
                            <div class="col mr-2">
                                <div class="text-xs fw-bold text-danger text-uppercase mb-1">Security Alerts</div>
                                <div class="h3 mb-0 fw-bold text-gray-800" id="totalAlerts">0</div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-exclamation-triangle fa-2x text-gray-300 fs-1 opacity-50 text-danger"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Traffic Volume Chart -->
            <div class="col-xl-8 col-lg-7">
                <div class="card shadow-sm mb-4 chart-card">
                    <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                        <h6 class="m-0 fw-bold text-primary">Traffic Volume (Timeline)</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-area">
                            <canvas id="trafficLineChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Protocol Distribution -->
            <div class="col-xl-4 col-lg-5">
                <div class="card shadow-sm mb-4 chart-card">
                    <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                        <h6 class="m-0 fw-bold text-primary">Protocol Distribution</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-pie">
                            <canvas id="protocolPieChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Suspicious Alerts Table -->
            <div class="col-xl-8 col-lg-7 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header py-3">
                        <h6 class="m-0 fw-bold text-danger">
                            <i class="bi bi-shield-exclamation me-1"></i> Recent Alerts
                        </h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 custom-table">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Time</th>
                                        <th>Alert Type</th>
                                        <th>Source IP</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody id="alertsTableBody">
                                    <tr>
                                        <td colspan="4" class="text-center text-muted">No alerts detected... yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Top Talkers -->
            <div class="col-xl-4 col-lg-5 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header py-3">
                        <h6 class="m-0 fw-bold text-primary">
                            <i class="bi bi-hdd-network me-1"></i> Top Talkers (Source IPs)
                        </h6>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush" id="topIpsList">
                            <li class="list-group-item text-muted text-center">Collecting data...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
